<!DOCTYPE html>

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="styles.css"/>
    <title>Odin Library</title>
</head>

<body>

    <h1 id='title'>My Library</h1>

    <div class="booksContainer">
        <div class="book">
            <h2 class="bookTitle">Lord of the Rings</h2>
            <h2 class="bookAuthor">Author: J.R.R. Tolkien</h2>
            <h2 class="bookPages">Pages: 1077</h2>
            <div class="bookRead">
                <h2>Read: </h2>
                <button class="bookReadBtn">Yes</button>
            </div>
        </div>
        <div class="book">
            <h2 class="bookTitle">Dune</h2>
            <h2 class="bookAuthor">Author: Frank Herbert</h2>
            <h2 class="bookPages">Pages: 412</h2>
            <div class="bookRead">
                <h2>Read: </h2>
                <button class="bookReadBtn">Yes</button>
            </div>
        </div>
        <div class="book">
            <h2 class="bookTitle">A Tale of Two Cities</h2>
            <h2 class="bookAuthor">Author: Charles Dickens</h2>
            <h2 class="bookPages">Pages: 428</h2>
            <div class="bookRead">
                <h2>Read: </h2>
                <button class="bookReadBtn">No</button>
            </div>
        </div>
        
    </div>
    <div class="inputContainer"></div>

    <script src="script.js"></script>
</body>

</html>
